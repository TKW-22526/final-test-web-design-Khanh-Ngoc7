<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên Hệ</title>

    <!-- Liên kết CSS -->
    <link rel="stylesheet" href="../css/style3.css">
</head>

<body>

<h1 class="title">Liên Hệ Với Chúng Tôi</h1>

<div class="contact-container">

    <!-- Form liên hệ -->
    <form class="contact-form">

        <label>Họ và tên</label>
        <input type="text" placeholder="Nhập họ tên..." required>

        <label>Email</label>
        <input type="email" placeholder="Nhập email..." required>

        <label>Số điện thoại</label>
        <input type="text" placeholder="Nhập số điện thoại..." required>

        <label>Nội dung</label>
        <textarea rows="5" placeholder="Nhập nội dung..." required></textarea>

        <button type="submit">Gửi liên hệ</button>

    </form>

</div>

</body>
</html>
